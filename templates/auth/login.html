{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow" style="border-top: 4px solid var(--theme-45); border-top-right-radius: 0; border-top-left-radius: 0;">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4" style="color: var(--theme-40);">
                    <i class="bi bi-door-open me-2"></i>Login
                </h3>
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100" style="background-color: var(--theme-45); border-color: var(--theme-70);">
                        <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
                    </button>
                </form>
                <div class="mt-3 text-center">
                    <small>Don't have an account? <a href="{{ url_for('auth.register') }}" style="color: var(--theme-45);">Register</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
