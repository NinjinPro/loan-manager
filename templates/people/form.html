{% extends "base.html" %}
{% block title %}{{ 'Edit' if person else 'Add' }} Person{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="card-title" style="color: var(--theme-80);">
                    <i class="bi bi-{{ 'pencil' if person else 'person-plus' }} me-2"></i>
                    {{ 'Edit' if person else 'Add' }} Person
                </h3>
                <form method="POST" action="{{ url_for('people.add_person') if not person else url_for('people.edit_person', id=person.id) }}" data-redirect="{{ url_for('people.list_people') }}" id="personForm">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label for="name" class="form-label">Name *</label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ person.name if person else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="phone" class="form-label">Phone</label>
                        <input type="text" class="form-control" id="phone" name="phone" value="{{ person.phone if person else '+2507' }}">
                    </div>
                    <div class="mb-3">
                        <label for="notes" class="form-label">Notes</label>
                        <textarea class="form-control" id="notes" name="notes" rows="2">{{ person.notes if person else '' }}</textarea>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('people.list_people') }}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary" style="background-color: var(--theme-75); border-color: var(--theme-70);">
                            <i class="bi bi-check-lg me-1"></i>
                            {{ 'Update' if person else 'Save' }}
                        </button>
                    </div>
                </form>
                <script>
                    handleOfflineForm(document.getElementById('personForm'), '/api/people', 'POST');
                </script>
            </div>
        </div>
    </div>
</div>
{% endblock %}
